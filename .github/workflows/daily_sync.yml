name: Kindle to Hardcover Sync

on:
  schedule:
    # Runs at minute 0 of every hour
    - cron: '0 * * * *'
  # Allows you to run manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of books to check (0 for all)'
        required: false
        default: '10'

jobs:
  sync_books:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Sync Script
      env:
        GOODREADS_RSS_URL: ${{ secrets.GOODREADS_RSS_URL }}
        HARDCOVER_API_TOKEN: ${{ secrets.HARDCOVER_API_TOKEN }}
      run: |
        LIMIT="${{ inputs.limit }}"
        if [ -z "$LIMIT" ]; then LIMIT="10"; fi
        if [ "$LIMIT" = "0" ]; then
          python sync.py
        else
          python sync.py --limit $LIMIT
        fi